<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spock — Sources & Themes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #111;
      min-height: 100vh;
    }

    header {
      background: #111;
      color: #fff;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 15px; font-weight: 400; letter-spacing: 0.05em; }

    nav {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 0 32px;
      display: flex;
      align-items: center;
    }
    nav a {
      color: #888;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 12px 16px;
      border-bottom: 2px solid transparent;
      transition: color 0.15s;
    }
    nav a:hover { color: #fff; }
    nav a.active { color: #fff; border-bottom-color: #fff; }
    nav .nav-links { margin-left: auto; display: flex; gap: 8px; }
    nav .platform-link {
      color: #888;
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 6px 12px;
      border: 1px solid #333;
      transition: color 0.15s, border-color 0.15s;
    }
    nav .platform-link:hover { color: #fff; border-color: #666; }

    #app { max-width: 780px; margin: 0 auto; padding: 32px 20px 80px; }

    .section-header { margin: 36px 0 6px; }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
    }
    .section-desc {
      font-size: 12px;
      color: #aaa;
      margin-top: 4px;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      margin-bottom: 12px;
    }

    .card-header {
      padding: 14px 20px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .card-title { font-size: 14px; font-weight: 500; color: #111; }
    .card-subtitle { font-size: 12px; color: #888; margin-top: 2px; }

    .card-body { padding: 0 20px 16px; }

    .subsection-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #bbb;
      margin: 12px 0 6px;
    }

    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      font-size: 12px;
      background: #f0f0f0;
      color: #444;
      padding: 4px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tag.domain { background: #111; color: #ccc; }
    .tag-remove {
      cursor: pointer;
      color: #bbb;
      font-size: 14px;
      line-height: 1;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
    }
    .tag-remove:hover { color: #9b2335; }

    .add-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .add-row input {
      flex: 1;
      border: 1px solid #ddd;
      padding: 6px 10px;
      font-size: 12px;
      font-family: inherit;
      color: #333;
      background: #fafafa;
    }
    .add-row input:focus { outline: none; border-color: #111; background: #fff; }
    .add-row input::placeholder { color: #bbb; }

    button {
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      padding: 6px 14px;
      transition: opacity 0.15s, background 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: default; }

    .btn-add     { background: #111; color: #fff; }
    .btn-add:hover:not(:disabled) { background: #333; }
    .btn-remove  { background: #fff; color: #9b2335; border: 1px solid #9b233330; font-size: 12px; padding: 5px 12px; }
    .btn-remove:hover:not(:disabled) { background: #9b233510; }
    .btn-add-theme { background: #f0f0f0; color: #333; margin-top: 8px; }
    .btn-add-theme:hover { background: #e0e0e0; }

    .save-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #111;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transform: translateY(100%);
      transition: transform 0.2s;
    }
    .save-bar.visible { transform: translateY(0); }
    .save-bar span { font-size: 13px; color: #888; }
    .btn-save { background: #2d6a4f; color: #fff; font-size: 13px; padding: 9px 24px; }
    .btn-save:hover { background: #25573f; }
    .btn-discard { background: transparent; color: #888; border: 1px solid #333; font-size: 13px; padding: 8px 16px; margin-right: 8px; }
    .btn-discard:hover { color: #fff; border-color: #666; }

    #error {
      background: #9b233515;
      border: 1px solid #9b233330;
      color: #9b2335;
      padding: 16px 20px;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .theme-name-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }
    .theme-name-input {
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-bottom: 1px solid transparent;
      background: transparent;
      font-family: inherit;
      color: #111;
      width: 100%;
      padding: 0;
    }
    .theme-name-input:focus { outline: none; border-bottom-color: #111; }
  </style>
</head>
<body>

<header>
  <h1>Spock — Sources &amp; Themes</h1>
</header>
<nav>
  <a href="/">Drafts</a>
  <a href="/sources" class="active">Sources</a>
  <div class="nav-links">
    <a href="https://www.linkedin.com/feed/" target="_blank" class="platform-link">LinkedIn</a>
    <a href="https://x.com/compose/tweet" target="_blank" class="platform-link">X</a>
  </div>
</nav>

<div id="app">
  <div id="error" style="display:none"></div>
  <div id="content"></div>
</div>

<div class="save-bar" id="save-bar">
  <span>Unsaved changes</span>
  <div>
    <button class="btn-discard" id="btn-discard">Discard</button>
    <button class="btn-save" id="btn-save">Save Changes</button>
  </div>
</div>

<script>
const API = 'http://localhost:3131';
let state = null;
let dirty = false;

async function load() {
  try {
    const res = await fetch(`${API}/api/sources`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    state = data;
    render();
  } catch (err) {
    showError(err.message);
  }
}

function markDirty() {
  dirty = true;
  document.getElementById('save-bar').classList.add('visible');
}

document.getElementById('btn-save').addEventListener('click', async () => {
  try {
    const res = await fetch(`${API}/api/sources`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state),
    });
    if (!res.ok) throw new Error('Save failed');
    dirty = false;
    document.getElementById('save-bar').classList.remove('visible');
  } catch (err) {
    showError(err.message);
  }
});

document.getElementById('btn-discard').addEventListener('click', () => {
  dirty = false;
  document.getElementById('save-bar').classList.remove('visible');
  load();
});

function render() {
  const el = document.getElementById('content');
  el.innerHTML = '';

  // ── Research Themes ──────────────────────────────────────────────────────
  const themesHeader = document.createElement('div');
  themesHeader.className = 'section-header';
  themesHeader.innerHTML = `
    <div class="section-label">Research Themes</div>
    <div class="section-desc">The core topics Spock investigates each day. Each theme runs multiple targeted searches via Tavily. <strong style="color:#666">Search queries</strong> control what gets searched. <strong style="color:#666">Priority domains</strong> restrict results to specific sites for that theme — good for newsletters, blogs, or Substacks relevant to a particular topic (e.g. <em>lenny.substack.com</em>). Use the subdomain format, not full URLs.</div>`;
  el.appendChild(themesHeader);

  state.themes.forEach((theme, ti) => el.appendChild(makeThemeCard(theme, ti)));

  const addThemeBtn = document.createElement('button');
  addThemeBtn.className = 'btn-add-theme';
  addThemeBtn.textContent = '+ Add Research Theme';
  addThemeBtn.addEventListener('click', () => {
    state.themes.push({ name: 'New Theme', queries: [], primaryDomains: [] });
    markDirty();
    render();
  });
  el.appendChild(addThemeBtn);

  // ── Quick Topics ─────────────────────────────────────────────────────────
  const topicsHeader = document.createElement('div');
  topicsHeader.className = 'section-header';
  topicsHeader.innerHTML = `
    <div class="section-label">Quick Topics</div>
    <div class="section-desc">Ad-hoc additions. Each label is sent as a single search query layered on top of the research themes — useful for one-off signals or short-term tracking. Not tied to any specific source.</div>`;
  el.appendChild(topicsHeader);

  const topicsCard = document.createElement('div');
  topicsCard.className = 'card';
  topicsCard.style.padding = '16px 20px';

  const topicTagList = document.createElement('div');
  topicTagList.className = 'tag-list';
  state.topics.forEach((t, i) => {
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.innerHTML = `${esc(t.label)} <button class="tag-remove" title="Remove">×</button>`;
    tag.querySelector('.tag-remove').addEventListener('click', () => {
      state.topics.splice(i, 1);
      markDirty();
      render();
    });
    topicTagList.appendChild(tag);
  });
  topicsCard.appendChild(topicTagList);

  const topicAddRow = document.createElement('div');
  topicAddRow.className = 'add-row';
  topicAddRow.innerHTML = `<input type="text" placeholder="e.g. AI regulation EU 2026" /><button class="btn-add">Add</button>`;
  const topicInput = topicAddRow.querySelector('input');
  topicAddRow.querySelector('.btn-add').addEventListener('click', () => {
    const val = topicInput.value.trim();
    if (!val) return;
    const id = String(Date.now());
    state.topics.push({ id, label: val, added: new Date().toISOString().split('T')[0] });
    topicInput.value = '';
    markDirty();
    render();
  });
  topicInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') topicAddRow.querySelector('.btn-add').click(); });
  topicsCard.appendChild(topicAddRow);
  el.appendChild(topicsCard);

  // ── Always-On Sources ─────────────────────────────────────────────────────
  const sourcesHeader = document.createElement('div');
  sourcesHeader.className = 'section-header';
  sourcesHeader.innerHTML = `
    <div class="section-label">Always-On Sources</div>
    <div class="section-desc">Trusted domains applied across <em>every</em> search, regardless of theme. Use sparingly — Tavily restricts results to only these domains when set, so a long list will narrow Spock's coverage significantly. Best for 1–3 must-read sources you want represented daily (e.g. a key industry blog). For topic-specific newsletters or Substacks, add them as Priority Domains on the relevant theme instead.</div>`;
  el.appendChild(sourcesHeader);

  const sourcesCard = document.createElement('div');
  sourcesCard.className = 'card';
  sourcesCard.style.padding = '16px 20px';

  const sourceTagList = document.createElement('div');
  sourceTagList.className = 'tag-list';
  state.sources.forEach((s, i) => {
    const tag = document.createElement('span');
    tag.className = 'tag domain';
    tag.innerHTML = `${esc(s.url)} <button class="tag-remove" title="Remove">×</button>`;
    tag.querySelector('.tag-remove').addEventListener('click', () => {
      state.sources.splice(i, 1);
      markDirty();
      render();
    });
    sourceTagList.appendChild(tag);
  });
  sourcesCard.appendChild(sourceTagList);

  const sourceAddRow = document.createElement('div');
  sourceAddRow.className = 'add-row';
  sourceAddRow.innerHTML = `
    <input type="text" placeholder="Label (e.g. a16z)" style="max-width:180px" id="src-label" />
    <input type="text" placeholder="Domain (e.g. a16z.com or lenny.substack.com)" id="src-url" />
    <button class="btn-add">Add</button>`;
  const srcLabel = sourceAddRow.querySelector('#src-label');
  const srcUrl = sourceAddRow.querySelector('#src-url');
  sourceAddRow.querySelector('.btn-add').addEventListener('click', () => {
    const label = srcLabel.value.trim();
    const url = srcUrl.value.trim();
    if (!label || !url) return;
    state.sources.push({ id: String(Date.now()), label, url, added: new Date().toISOString().split('T')[0] });
    srcLabel.value = ''; srcUrl.value = '';
    markDirty();
    render();
  });
  sourcesCard.appendChild(sourceAddRow);
  el.appendChild(sourcesCard);
}

function makeThemeCard(theme, ti) {
  const card = document.createElement('div');
  card.className = 'card';

  card.innerHTML = `
    <div class="card-header">
      <div class="theme-name-row">
        <input class="theme-name-input" value="${esc(theme.name)}" />
      </div>
      <button class="btn-remove">Remove</button>
    </div>
    <div class="card-body">
      <div class="subsection-label">Search Queries</div>
      <div class="tag-list query-tags"></div>
      <div class="add-row">
        <input type="text" placeholder="Add a search query…" class="query-input" />
        <button class="btn-add query-add-btn">Add</button>
      </div>
      <div class="subsection-label" style="margin-top:16px">Priority Domains</div>
      <div class="tag-list domain-tags"></div>
      <div class="add-row">
        <input type="text" placeholder="e.g. lenny.substack.com or stratechery.com" class="domain-input" />
        <button class="btn-add domain-add-btn">Add</button>
      </div>
    </div>`;

  // theme name
  const nameInput = card.querySelector('.theme-name-input');
  nameInput.addEventListener('input', () => {
    state.themes[ti].name = nameInput.value;
    markDirty();
  });

  // remove theme
  card.querySelector('.btn-remove').addEventListener('click', () => {
    state.themes.splice(ti, 1);
    markDirty();
    render();
  });

  // queries
  const queryTags = card.querySelector('.query-tags');
  (theme.queries || []).forEach((q, qi) => {
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.innerHTML = `${esc(q)} <button class="tag-remove" title="Remove">×</button>`;
    tag.querySelector('.tag-remove').addEventListener('click', () => {
      state.themes[ti].queries.splice(qi, 1);
      markDirty();
      render();
    });
    queryTags.appendChild(tag);
  });

  const queryInput = card.querySelector('.query-input');
  card.querySelector('.query-add-btn').addEventListener('click', () => {
    const val = queryInput.value.trim();
    if (!val) return;
    state.themes[ti].queries.push(val);
    queryInput.value = '';
    markDirty();
    render();
  });
  queryInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') card.querySelector('.query-add-btn').click(); });

  // domains
  const domainTags = card.querySelector('.domain-tags');
  (theme.primaryDomains || []).forEach((d, di) => {
    const tag = document.createElement('span');
    tag.className = 'tag domain';
    tag.innerHTML = `${esc(d)} <button class="tag-remove" title="Remove">×</button>`;
    tag.querySelector('.tag-remove').addEventListener('click', () => {
      state.themes[ti].primaryDomains.splice(di, 1);
      markDirty();
      render();
    });
    domainTags.appendChild(tag);
  });

  const domainInput = card.querySelector('.domain-input');
  card.querySelector('.domain-add-btn').addEventListener('click', () => {
    const val = domainInput.value.trim();
    if (!val) return;
    if (!state.themes[ti].primaryDomains) state.themes[ti].primaryDomains = [];
    state.themes[ti].primaryDomains.push(val);
    domainInput.value = '';
    markDirty();
    render();
  });
  domainInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') card.querySelector('.domain-add-btn').click(); });

  return card;
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}

function esc(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

load();
</script>
</body>
</html>
